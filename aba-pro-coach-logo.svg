<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 180" width="340" height="180">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF"/>
      <stop offset="100%" style="stop-color:#0DA898"/>
    </linearGradient>
  </defs>

  <!-- ABA — massive, black, tight tracking -->
  <text
    x="170"
    y="108"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="108"
    font-weight="900"
    letter-spacing="-4"
    fill="#0F2744">ABA</text>

  <!-- Teal underline beneath ABA -->
  <rect x="60" y="118" width="220" height="3.5" rx="1.75" fill="url(#g)"/>

  <!-- Pro Coach — spaced, lighter weight, teal -->
  <text
    x="170"
    y="158"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="300"
    letter-spacing="12"
    fill="#2DD4BF">PRO COACH</text>

</svg>
